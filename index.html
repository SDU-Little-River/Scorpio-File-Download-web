<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scorpio File Downloads</title>
    <style>
      :root {
        /* Light Theme Variables */
        --primary-color: #42b983;
        --bg-color: #f7f9fa;
        --card-bg: #ffffff;
        --text-color: #34495e;
        --sub-text-color: #666666;
        --border-color: #eaecef;
        --hover-bg: #f0fcf6;
        --input-bg: #ffffff;
        --modal-bg: rgba(255, 255, 255, 0.98);
        --modal-overlay: rgba(0, 0, 0, 0.6);
        --btn-bg: #ffffff;
        --btn-text: #2c3e50;
      }

      /* Dark Theme Variables */[data-theme="dark"] {
        --primary-color: #42b983;
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #e0e0e0;
        --sub-text-color: #a0a0a0;
        --border-color: #333333;
        --hover-bg: #2c3e50;
        --input-bg: #2d2d2d;
        --modal-bg: rgba(30, 30, 30, 0.98);
        --modal-overlay: rgba(0, 0, 0, 0.8);
        --btn-bg: #2d2d2d;
        --btn-text: #e0e0e0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: var(--card-bg);
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        padding: 20px;
        min-height: 80vh;
        position: relative;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-color);
      }
      .header h2 {
        margin: 0;
        font-size: 24px;
      }
      .header-actions {
        display: flex;
        gap: 10px;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-color);
        padding: 8px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.3s;
      }

      /* Custom Social Icons Colors */
      .icon-btn[title="YouTube"] svg { color: #ff0000; }
      .icon-btn[title="GitHub"] svg { color: #9333ea; }
      .icon-btn:hover { background-color: var(--border-color); }
      
      .svg-icon { width: 24px; height: 24px; fill: currentColor; }

      .search-box { margin-bottom: 20px; position: relative; }
      .search-input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid var(--border-color);
        border-radius: 6px;
        font-size: 16px;
        background-color: var(--input-bg);
        color: var(--text-color);
        box-sizing: border-box;
        transition: all 0.3s;
      }
      .search-input:focus { outline: none; border-color: var(--primary-color); }

      /* Folder Action Bar */
      .folder-actions {
        margin-bottom: 15px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 6px;
        background-color: var(--hover-bg);
        color: var(--primary-color);
        border: 1px solid var(--border-color);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: all 0.2s;
      }
      .btn-sm:hover {
        background-color: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
      }

      .breadcrumbs {
        margin-bottom: 15px;
        font-size: 15px;
        color: var(--sub-text-color);
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-color);
        white-space: nowrap;
        overflow-x: auto;
      }
      .crumb { cursor: pointer; color: var(--primary-color); font-weight: 500; }
      .crumb:hover { text-decoration: underline; }
      .crumb-separator { margin: 0 5px; color: var(--sub-text-color); }
      .crumb-current { color: var(--sub-text-color); cursor: default; text-decoration: none !important; }

      .file-list { list-style: none; padding: 0; margin: 0; }
      .file-item {
        display: flex;
        align-items: center;
        padding: 12px 10px;
        border-bottom: 1px solid var(--border-color);
        transition: background-color 0.2s;
        cursor: pointer;
        border-radius: 4px;
        color: var(--text-color);
        position: relative;
      }
      .file-item:hover { background-color: var(--hover-bg); }
      .item-icon { width: 24px; height: 24px; margin-right: 12px; flex-shrink: 0; }
      .item-name {
        flex-grow: 1;
        font-size: 15px;
        word-break: break-all;
      }

      /* Download Count Badge */
      .file-meta {
        font-size: 12px;
        color: var(--sub-text-color);
        margin-right: 15px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .file-meta svg { width: 14px; height: 14px; }

      /* Copy Button in List (Fixed: Always display, toggle opacity) */
      .list-copy-btn {
        padding: 6px;
        border-radius: 4px;
        color: var(--sub-text-color);
        display: flex;
        opacity: 0;
        transition: opacity 0.2s, background-color 0.2s;
        align-items: center;
        justify-content: center;
      }
      .file-item:hover .list-copy-btn { opacity: 1; }
      .list-copy-btn:hover {
        background-color: rgba(0, 0, 0, 0.1);
        color: var(--primary-color);
      }

      .loading,
      .error { text-align: center; padding: 40px; color: var(--sub-text-color); }
      .error { color: #e74c3c; }

      .modal {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background-color: var(--modal-bg); backdrop-filter: blur(8px); padding: 25px;
